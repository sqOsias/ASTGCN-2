<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时交通态势感知大屏 | ASTGCN Traffic Prediction</title>
    <style>
      body {
        margin: 0;
        background: #0a0e17;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        document.getElementById('app').innerHTML = '<pre style="color:red;padding:20px;font-size:14px;">Global Error: ' + msg + '\nURL: ' + url + '\nLine: ' + line + '\n' + (error ? error.stack : '') + '</pre>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('app').innerHTML = '<pre style="color:red;padding:20px;font-size:14px;">Unhandled Rejection: ' + e.reason + '\n' + (e.reason && e.reason.stack ? e.reason.stack : '') + '</pre>';
      });
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
