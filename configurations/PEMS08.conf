[Data]
adj_filename = data/PEMS08/distance.csv
graph_signal_matrix_filename = data/PEMS08/pems08.npz
num_of_vertices = 170
points_per_hour = 12
num_for_predict = 36

[Training]
model_name = ASTGCN
ctx = gpu-1
optimizer = adam
learning_rate = 0.001
epochs = 200
batch_size = 16
num_of_weeks = 1
num_of_days = 1
num_of_hours = 3
K = 3
merge = 0
prediction_filename = ASTGCN_prediction_08
params_dir = experiment2

[ModelUpgrade]
spatial_mode = 0,1
temporal_mode = 0,1

[AdaptiveGraph]
embedding_dim = 10
sparse_ratio = 0.2
directed = true

[Transformer]
d_model = 64
n_heads = 4
e_layers = 2
dropout = 0.1
max_len = 36
topk_ratio = 0.5
